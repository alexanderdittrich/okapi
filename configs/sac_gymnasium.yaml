# SAC NNX Configuration
defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled
 
hydra:
  run:
    dir: .
  output_subdir: null

# Environment
env_id: "HalfCheetah-v5"  # Try: "HalfCheetah-v5", "Ant-v5", "Hopper-v5", "Walker2d-v5"
num_envs: 1  # SAC typically uses single environment

# Training
total_timesteps: 1000000
learning_starts: 5000  # number of steps before training starts
batch_size: 256  # minibatch size for training

# SAC hyperparameters (tuned from Stable-Baselines3)
actor_lr: 3e-4
critic_lr: 3e-4
alpha_lr: 3e-4
gamma: 0.99
tau: 0.005  # soft update coefficient for target networks
target_update_interval: 1  # update target networks every N steps
auto_tune_alpha: true  # automatically tune entropy coefficient
alpha: 0.2  # initial entropy coefficient (if not auto-tuning)
target_entropy_scale: 1.0  # scale for target entropy (-dim(A) * scale)

# Replay buffer
buffer_size: 1000000

# Network architecture
# Hidden layer sizes for actor and critic networks
actor_hidden_sizes: [256, 256]   # Actor/policy network hidden layers
critic_hidden_sizes: [256, 256]  # Critic/Q network hidden layers
# Activation functions (Options: relu (SAC default), tanh, swish, elu, gelu, leaky_relu)
actor_activation: "relu"   # Actor/policy network activation
critic_activation: "relu"  # Critic/Q network activation

# Normalization
norm_obs: false  # normalize observations

# Logging
log_frequency: 1000  # log every N steps
use_wandb: false
wandb_project: "sac-nnx"  # wandb project name
seed: 42

# Checkpointing
save_model: true  # save model checkpoints
checkpoint_dir: "checkpoints"  # directory to save checkpoints
checkpoint_frequency: 50000  # save checkpoint every N steps
keep_checkpoints: 3  # number of checkpoints to keep
resume_from: null  # path to checkpoint directory to resume from
